<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Timetable Multi-Colore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        
        :root {
            --th-bg: #F2EBE9;
            --th-text: #8C7A74;
            --td-bg: #FCFAFA;
            --td-border: #F2EBE9;
            --time-bg: #FAF4F2;
            --focus-border: #D4C5C1;
            --text-color: #5c5552;
        }

        [data-theme="pink"] {
            --th-bg: #FCE4EC;
            --th-text: #880E4F;
            --td-bg: #FFF3F8;
            --td-border: #FCE4EC;
            --time-bg: #FAEAEE;
            --focus-border: #F8BBD0;
            --text-color: #5C3A46;
        }

        [data-theme="blue"] {
            --th-bg: #E3F2FD;
            --th-text: #0D47A1;
            --td-bg: #F5FAFF;
            --td-border: #E3F2FD;
            --time-bg: #EBF4FA;
            --focus-border: #BBDEFB;
            --text-color: #3A4B5C;
        }

        [data-theme="purple"] {
            --th-bg: #F3E5F5;
            --th-text: #4A148C;
            --td-bg: #FAF5FB;
            --td-border: #F3E5F5;
            --time-bg: #F6EBF8;
            --focus-border: #E1BEE7;
            --text-color: #4A3A5C;
        }

        [data-theme="green"] {
            --th-bg: #E8F5E9;
            --th-text: #1B5E20;
            --td-bg: #F4FBF5;
            --td-border: #E8F5E9;
            --time-bg: #EDF7EE;
            --focus-border: #C8E6C9;
            --text-color: #3A5C41;
        }

        body, html {
            margin: 0;
            padding: 10px;
            background-color: transparent;
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .theme-picker {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 25px;
        }

        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .color-dot:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            max-width: 1000px;
            border-collapse: separate;
            border-spacing: 6px;
        }

        th, td {
            padding: 15px 10px;
            text-align: center;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
        }

        th {
            background-color: var(--th-bg);
            color: var(--th-text);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        td {
            background-color: var(--td-bg);
            border: 1px solid var(--td-border);
            height: 50px;
            outline: none;
            cursor: text;
        }

        .time-col {
            background-color: var(--time-bg);
            font-weight: 500;
            color: var(--th-text);
        }

        td:focus {
            background-color: #FFFFFF;
            border-color: var(--focus-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transform: translateY(-1px);
        }

        td:empty:before {
            content: "-";
            opacity: 0.4;
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="theme-picker">
        <div class="color-dot" style="background-color: #D4C5C1;" data-theme-target="default" title="Beige"></div>
        <div class="color-dot" style="background-color: #F8BBD0;" data-theme-target="pink" title="Rosa"></div>
        <div class="color-dot" style="background-color: #BBDEFB;" data-theme-target="blue" title="Blu"></div>
        <div class="color-dot" style="background-color: #E1BEE7;" data-theme-target="purple" title="Viola"></div>
        <div class="color-dot" style="background-color: #C8E6C9;" data-theme-target="green" title="Verde"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Orario</th>
                <th>Lunedì</th>
                <th>Martedì</th>
                <th>Mercoledì</th>
                <th>Giovedì</th>
                <th>Venerdì</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="time-col" contenteditable="true" id="time-1"></td>
                <td contenteditable="true" id="cell-1"></td>
                <td contenteditable="true" id="cell-2"></td>
                <td contenteditable="true" id="cell-3"></td>
                <td contenteditable="true" id="cell-4"></td>
                <td contenteditable="true" id="cell-5"></td>
            </tr>
            <tr>
                <td class="time-col" contenteditable="true" id="time-2"></td>
                <td contenteditable="true" id="cell-6"></td>
                <td contenteditable="true" id="cell-7"></td>
                <td contenteditable="true" id="cell-8"></td>
                <td contenteditable="true" id="cell-9"></td>
                <td contenteditable="true" id="cell-10"></td>
            </tr>
            <tr>
                <td class="time-col" contenteditable="true" id="time-3"></td>
                <td contenteditable="true" id="cell-11"></td>
                <td contenteditable="true" id="cell-12"></td>
                <td contenteditable="true" id="cell-13"></td>
                <td contenteditable="true" id="cell-14"></td>
                <td contenteditable="true" id="cell-15"></td>
            </tr>
            <tr>
                <td class="time-col" contenteditable="true" id="time-4"></td>
                <td contenteditable="true" id="cell-16"></td>
                <td contenteditable="true" id="cell-17"></td>
                <td contenteditable="true" id="cell-18"></td>
                <td contenteditable="true" id="cell-19"></td>
                <td contenteditable="true" id="cell-20"></td>
            </tr>
            <tr>
                <td class="time-col" contenteditable="true" id="time-5"></td>
                <td contenteditable="true" id="cell-21"></td>
                <td contenteditable="true" id="cell-22"></td>
                <td contenteditable="true" id="cell-23"></td>
                <td contenteditable="true" id="cell-24"></td>
                <td contenteditable="true" id="cell-25"></td>
            </tr>
        </tbody>
    </table>

    <script>
        // 1. GESTIONE DEL TEMA (COLORI)
        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('timetable-theme', themeName);
        }

        // Imposta il tema al caricamento iniziale
        const savedTheme = localStorage.getItem('timetable-theme') || 'default';
        setTheme(savedTheme);

        // Aggiunge la funzionalità del click ad ogni pallino colorato
        const colorDots = document.querySelectorAll('.color-dot');
        colorDots.forEach(dot => {
            dot.addEventListener('click', () => {
                const selectedTheme = dot.getAttribute('data-theme-target');
                setTheme(selectedTheme);
            });
        });

        // 2. GESTIONE DEL TESTO (ORARI E MATERIE)
        const cells = document.querySelectorAll('td[contenteditable="true"]');
        cells.forEach(cell => {
            const savedText = localStorage.getItem(cell.id);
            if (savedText) {
                cell.innerText = savedText;
            }
            cell.addEventListener('input', () => {
                localStorage.setItem(cell.id, cell.innerText);
            });
        });
    </script>

</body>
</html>
