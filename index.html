<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Timetable</title>
    <style>
        /* Importiamo un font elegante da Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap');
        
        body, html {
            margin: 0;
            padding: 10px;
            background-color: transparent;
            font-family: 'Poppins', sans-serif;
            color: #5c5552; /* Colore del testo grigio scuro/marrone */
            display: flex;
            justify-content: center;
        }

        table {
            width: 100%;
            max-width: 900px;
            border-collapse: separate;
            border-spacing: 6px; /* Spazio tra le celle per l'effetto aesthetic */
        }

        th, td {
            padding: 15px 10px;
            text-align: center;
            border-radius: 12px; /* Angoli morbidamente arrotondati */
            font-size: 0.95rem;
        }

        /* Stile per i giorni della settimana (Intestazione) */
        th {
            background-color: #F2EBE9; /* Beige pastello chiarissimo */
            color: #8C7A74;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        /* Stile per le caselle dove scriverai */
        td {
            background-color: #FCFAFA; /* Quasi bianco */
            border: 1px solid #F2EBE9;
            height: 50px;
            outline: none; /* Rimuove il bordo blu brutto quando clicchi */
            transition: all 0.3s ease;
            cursor: text;
        }

        /* Effetto quando clicchi su una casella per scrivere */
        td:focus {
            background-color: #FFFFFF;
            border-color: #D4C5C1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transform: translateY(-1px);
        }

        /* Testo segnaposto se la casella è vuota */
        td:empty:before {
            content: "-";
            color: #D4C5C1;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Lunedì</th>
                <th>Martedì</th>
                <th>Mercoledì</th>
                <th>Giovedì</th>
                <th>Venerdì</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td contenteditable="true" id="cell-1"></td>
                <td contenteditable="true" id="cell-2"></td>
                <td contenteditable="true" id="cell-3"></td>
                <td contenteditable="true" id="cell-4"></td>
                <td contenteditable="true" id="cell-5"></td>
            </tr>
            <tr>
                <td contenteditable="true" id="cell-6"></td>
                <td contenteditable="true" id="cell-7"></td>
                <td contenteditable="true" id="cell-8"></td>
                <td contenteditable="true" id="cell-9"></td>
                <td contenteditable="true" id="cell-10"></td>
            </tr>
            <tr>
                <td contenteditable="true" id="cell-11"></td>
                <td contenteditable="true" id="cell-12"></td>
                <td contenteditable="true" id="cell-13"></td>
                <td contenteditable="true" id="cell-14"></td>
                <td contenteditable="true" id="cell-15"></td>
            </tr>
            <tr>
                <td contenteditable="true" id="cell-16"></td>
                <td contenteditable="true" id="cell-17"></td>
                <td contenteditable="true" id="cell-18"></td>
                <td contenteditable="true" id="cell-19"></td>
                <td contenteditable="true" id="cell-20"></td>
            </tr>
        </tbody>
    </table>

    <script>
        // Questa parte di codice si occupa di SALVARE ciò che scrivi

        // Seleziona tutte le celle dove è permesso scrivere
        const cells = document.querySelectorAll('td[contenteditable="true"]');

        cells.forEach(cell => {
            // 1. Quando carichi la pagina, recupera il testo salvato in precedenza
            const savedText = localStorage.getItem(cell.id);
            if (savedText) {
                cell.innerText = savedText;
            }

            // 2. Ogni volta che digiti qualcosa, salvalo immediatamente nella memoria del browser
            cell.addEventListener('input', () => {
                localStorage.setItem(cell.id, cell.innerText);
            });
        });
    </script>

</body>
</html>
